name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  # release-please maintains a release PR (version bumps + CHANGELOG) from
  # Conventional Commits. Merging that PR creates the GitHub release + tag.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When a release is cut, build the plugin and attach its artifacts.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Build plugin
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Check for optional styles
        id: styles
        run: |
          [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" \
            main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }} \
            --clobber
