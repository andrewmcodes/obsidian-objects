[tools]
node = "24.13.0"

# pnpm is provided through Corepack (bundled with Node). The version is pinned
# via the "packageManager" field in package.json, so `corepack pnpm ...` always
# runs the right pnpm without a separate install.

[tasks.install]
description = "Install dependencies with pnpm (via Corepack)"
run = "corepack pnpm install"

[tasks.dev]
description = "Watch build. Set OBSIDIAN_VAULT_PATH to build into a vault for hot reload."
run = "corepack pnpm run dev"

[tasks.build]
description = "Type-check and produce a production bundle"
run = "corepack pnpm run build"

[tasks.lint]
description = "Lint the project with ESLint"
run = "corepack pnpm exec eslint ."

[tasks.format]
description = "Format with Prettier and apply ESLint autofixes"
run = "corepack pnpm exec eslint . --fix && corepack pnpm exec prettier --write ."

[tasks.format-check]
description = "Check formatting with Prettier"
run = "corepack pnpm exec prettier --check ."

[tasks.test]
description = "Run the test suite once"
run = "corepack pnpm run test"

[tasks.hooks]
description = "Install git hooks (commit-msg → commitlint)"
run = "git config core.hooksPath .githooks && chmod +x .githooks/*"

# Build, then copy the release artifacts into a vault's plugin folder.
# Set OBSIDIAN_VAULT_PATH to your vault path, e.g.
#   OBSIDIAN_VAULT_PATH="$HOME/Notes" mise run install-plugin
# A leading ~ is expanded. Quote the value so the shell doesn't expand it too
# early (the task handles ~ itself).
[tasks.install-plugin]
description = "Build and copy main.js/manifest.json/styles.css into $OBSIDIAN_VAULT_PATH"
depends = ["build"]
run = """
if [ -z "$OBSIDIAN_VAULT_PATH" ]; then
  echo "Set OBSIDIAN_VAULT_PATH to your vault path, e.g. OBSIDIAN_VAULT_PATH=\\"$HOME/Notes\\"" >&2
  exit 1
fi
# Expand a leading ~ (it is not expanded inside quotes by the shell).
vault="$OBSIDIAN_VAULT_PATH"
case "$vault" in
  "~") vault="$HOME" ;;
  "~/"*) vault="$HOME/${vault#~/}" ;;
esac
# Refuse anything that isn't an absolute path, so we never create folders inside
# the repo by accident.
case "$vault" in
  /*) ;;
  *) echo "OBSIDIAN_VAULT_PATH must be an absolute path (got: $OBSIDIAN_VAULT_PATH)" >&2; exit 1 ;;
esac
if [ ! -d "$vault" ]; then
  echo "Vault folder does not exist: $vault" >&2
  exit 1
fi
dest="$vault/.obsidian/plugins/obsidian-objects"
mkdir -p "$dest"
cp main.js manifest.json styles.css "$dest/"
echo "Installed to $dest"
echo "Reload Obsidian, then enable Objects under Settings → Community plugins → Installed plugins."
"""

[tasks.check]
description = "Run lint, format check, build, and tests together"
depends = ["lint", "format-check", "build", "test"]
