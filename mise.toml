[tools]
node = "24.13.0"

[tasks.install]
description = "Install npm dependencies"
run = "npm install"

[tasks.dev]
description = "Build in watch mode for local development"
run = "npm run dev"

[tasks.build]
description = "Type-check and produce a production bundle"
run = "npm run build"

[tasks.lint]
description = "Lint the project with ESLint"
run = "npm run lint"

[tasks.format]
description = "Format the project with Prettier"
run = "prettier --write ."

[tasks.format-check]
description = "Check formatting with Prettier"
run = "prettier --check ."

[tasks.hooks]
description = "Install git hooks (commit-msg → commitlint)"
run = "git config core.hooksPath .githooks && chmod +x .githooks/*"

[tasks.test]
description = "Run the test suite once"
run = "npm run test"

[tasks.check]
description = "Run lint, type-check/build, and tests"
depends = ["lint", "build", "test"]
